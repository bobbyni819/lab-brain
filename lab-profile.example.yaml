# ─────────────────────────────────────────────────────────────────────────────
# lab-profile.yaml — the ENTIRE customization layer for Lab Brain.
#
# One file. Edit this; the skills and code never change. It tells Lab Brain how
# YOUR lab names things, where your storage lives, who's on the team (and in what
# role), and what vocabulary to tag. `/lab-init` generates a first draft by
# interviewing you or sampling a subtree — you correct it, then everything else
# reads from here.
#
# Genericity principle (from the design): ship grounded, sensible defaults +
# put all lab-specific knobs HERE + let the model translate your conventions at
# ingest time. Do NOT build abstract templates. This file IS the abstraction.
# ─────────────────────────────────────────────────────────────────────────────

lab:
  name: "Hickey Lab"                 # your lab / group / project name
  # Map initials used in filenames to real people (Lab Brain resolves ownership).
  initials_map:
    JWH: "John Hickey"
    BN:  "Bobby Ni"
    AR:  "Alex Rivera"      # example mentee

# WHERE the lab's mess lives. Multiple roots, multiple backends. `role` tells
# Lab Brain what a root is FOR so it can weight reading effort.
storage:
  - { root: "/mnt/box",                 backend: box,    role: "raw + docs" }
  - { root: "G:/My Drive/Knowledge",    backend: gdrive, role: "curated KB" }
  - { root: "~/repos",                  backend: local,  role: "code" }

# HOW your filenames encode meaning. These are regexes; edit to match your lab.
naming:
  date_prefix: '^(\d{8})_'             # 20260619_flu_papers
  initials_suffix: '_([A-Z]{2,4})$'    # ..._JWH
  processed_dirs: ["_processed", "processed"]

# HOW to infer projects when folders lie. `infer_from` is the cheap default;
# `aliases` pins the messy names to canonical project ids.
projects:
  infer_from: top_level_folder         # e.g. a Box top-level folder == a project
  aliases:
    "20260620_metabolism_papers": metabolism
    "CODEX_MALDIIMS":             metabolism
    "20260210_Influenza_ABM":     influenza

# ─── THE ROSTER — this is what powers multi-user collaboration ───────────────
# Every member gets a role. Roles change how much scaffolding the KB surfaces
# and how the check-in loop treats them (see framework/mentorship-and-collaboration.md).
#   pi         → reads the condensed team rollup; sets direction
#   mentor     → runs the check-in loop (a PM / lead mentor for students)
#   maintainer → a peer who owns/maintains a workstream; commits reviewed as an equal, no scaffolding
#   mentee     → a student contributing under supervision; gets onboarding scaffold + a digest + feedback each round
roster:
  - { name: "John Hickey", handle: JWH, role: pi }
  - { name: "Bobby Ni",    handle: BN,  role: mentor,
      storage: ["/mnt/box/Bobby_Ni", "G:/My Drive/Knowledge"] }
  - { name: "Alex Rivera", handle: AR,  role: mentee,
      storage: ["/mnt/box/mentee_workspace"], mentor: BN }

# WHICH harness drives which kind of work (see framework/harness-playbook.md).
# Lab Brain writes the same KB from both; this just records the convention.
harnesses:
  claude_science: { for: "omics / structural-bio / literature analysis; figure & panel reading" }
  claude_code:    { for: "code, sims, git, manuscripts, decks; long hands-off loops via Codex" }

# DOMAIN routing — segment or exclude subtrees that aren't lab science
# (e.g. venture/deal-sourcing, personal finance). Keeps the brain focused.
domains:
  - { match: '^DCP|Active Deals', route: venture, action: exclude }
  - { match: '.*',                route: science }

# READ TIERS — how deeply to read each format (cost control). FULL = semantic
# deep read; SKIM = text + captions; METADATA = index only; SKIP = ignore.
read_tiers:
  FULL:     [pptx, docx, ipynb, py, md]
  SKIM:     [pdf, xlsx]
  METADATA: [csv, mov, mp4, msg]
  SKIP:     [tmp, DS_Store, "~$*"]

# VOCABULARY — lab jargon so entities get tagged correctly, not mangled.
vocabulary: [CODEX, MALDI-IMS, MaxFuse, GLIMPRINT, Perturb-seq, scVI, H9N2, calcitriol, VDR]

# PRIVACY — never index or emit these. PII boundary is enforced, not advisory.
privacy:
  exclude_globs: ["*CV*", "*grant*unpublished*", "*offer_letter*"]
  redact: [emails, phone_numbers]

# OUTPUT — where the shared KB (the "brain") is written, and in what format.
output:
  location: "G:/My Drive/Knowledge/labbrain_registry"
  format: obsidian_markdown           # human-browsable vault; also emits a JSON index
  also_json: true

# COST — bound the expensive crawl so it can't run away on 10k files.
cost:
  max_full_reads: 500
  model_tier: reasoning_for_slides_and_figures_else_default

# FIGURE READING — the showcased capability. Scope is bounded on purpose (D3):
# clean single-axis charts read confidently; dense montages are flagged, not faked.
figures:
  scope: [bar, box, dose_response, kaplan_meier, kinetics]
  punt:  [heatmap, dense_multipanel]   # flagged NEEDS-REVIEW, never silently wrong
  render_scale: 3.05                   # ~220 DPI; proven legible for panel reads
  verification: two_tier               # verified | needs_review, crop ALWAYS kept
