  body_text: >
    Calcitriol treatment reduced the expression of the pro-inflammatory cytokine IL-6 at the
    earliest stages of infection... the levels of IL-6 were upregulated up to 5.6 fold in
    calcitriol-treated infected mice at 4 days post-infection.
  captions:
    Fig5: "Expression of pro-inflammatory and antiviral cytokines in calcitriol treated mice. IL-6 (a), TNF-a (b), IL-2 (c), IL-4 (d), IFN-b (e) measured by real-time PCR; RQ (2-ddCt) normalized to b-actin, calibrated to infected control."
    Fig4: "Expression of the H9N2 M gene in the lungs of infected mice after treatment with calcitriol. RQ (2-ddCt) fold-change, normalized to b-actin, calibrated to untreated infected group. Note the broken y-axis."

