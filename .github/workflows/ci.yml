name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m pytest tests -q
      - name: Smoke-test the figure slice (offline, fixture provider)
        run: >
          python -m labbrain.slice --paper gui2017 --provider fixture
          --vault /tmp/vault --report /tmp/report.html
      - name: Smoke-test the structural scanner
        run: python -m labbrain.lab_scan --root framework --out /tmp/scan
